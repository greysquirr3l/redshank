[book]
title = "Redshank"
authors = ["Nick Campbell"]
description = "An autonomous recursive language-model investigation agent written in Rust."
language = "en"
src = "src"

[output.html]
site-url = "/redshank/"
git-repository-url = "https://github.com/greysquirr3l/redshank"
edit-url-template = "https://github.com/greysquirr3l/redshank/edit/main/docs/src/{path}"
no-section-label = false
default-theme = "navy"
preferred-dark-theme = "navy"
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
