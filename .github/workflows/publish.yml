name: Publish Crates

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish from (e.g., v0.2.1)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_VERSION: "1.94"

jobs:
  resolve-ref:
    name: Resolve publish ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.out.outputs.ref }}
    steps:
      - name: Resolve ref
        id: out
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

  publish-core:
    name: Publish redshank-core
    runs-on: ubuntu-latest
    needs: [resolve-ref]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Publish redshank-core if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          crate="redshank-core"
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="redshank-core") | .version')

          if curl -fsSL "https://crates.io/api/v1/crates/${crate}" \
            | jq -e --arg v "$version" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "${crate} ${version} already published; skipping"
            exit 0
          fi

          cargo publish -p "${crate}" --locked

  publish-mid:
    name: Publish redshank-fetchers and redshank-tui
    runs-on: ubuntu-latest
    needs: [resolve-ref, publish-core]
    strategy:
      fail-fast: false
      matrix:
        crate: [redshank-fetchers, redshank-tui]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Wait for core crate index propagation
        shell: bash
        run: |
          set -euo pipefail
          core_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="redshank-core") | .version')
          for attempt in {1..20}; do
            if CARGO_TERM_COLOR=never cargo search redshank-core --limit 1 | grep -Eq "^redshank-core\s*=\s*\"${core_version}\""; then
              echo "redshank-core ${core_version} appears in crates index"
              exit 0
            fi
            echo "Attempt ${attempt}/20: waiting for crates.io index propagation..."
            sleep 20
          done
          echo "Timed out waiting for redshank-core index propagation" >&2
          exit 1

      - name: Publish crate if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          crate="${{ matrix.crate }}"
          version=$(cargo metadata --no-deps --format-version 1 | jq -r --arg c "$crate" '.packages[] | select(.name==$c) | .version')

          if curl -fsSL "https://crates.io/api/v1/crates/${crate}" \
            | jq -e --arg v "$version" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "${crate} ${version} already published; skipping"
            exit 0
          fi

          cargo publish -p "${crate}" --locked

  publish-cli:
    name: Publish redshank-cli
    runs-on: ubuntu-latest
    needs: [resolve-ref, publish-mid]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Publish redshank-cli if needed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          crate="redshank-cli"
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="redshank-cli") | .version')

          if curl -fsSL "https://crates.io/api/v1/crates/${crate}" \
            | jq -e --arg v "$version" '.versions[] | select(.num == $v)' >/dev/null; then
            echo "${crate} ${version} already published; skipping"
            exit 0
          fi

          cargo publish -p "${crate}" --locked
