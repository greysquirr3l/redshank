name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    # Run every Monday at 08:00 UTC to catch newly-published advisories
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  audit:
    name: Cargo Audit (SARIF)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      - name: Install cargo-audit (with SARIF support)
        run: cargo install cargo-audit --features sarif --locked

      - name: Run cargo audit → SARIF
        # Continue on findings so the upload step always runs
        run: |
          cargo audit --output-format sarif --quiet 2>/dev/null \
            > redshank-audit.sarif || cargo audit --output-format sarif \
            > redshank-audit.sarif 2>&1 || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: redshank-audit.sarif
          category: cargo-audit

      - name: Fail on vulnerabilities with fixes available
        run: cargo audit --deny warnings
