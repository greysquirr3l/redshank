name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_run:
    workflows:
      - "Auto Tag"
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.2.1)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_VERSION: "1.94"
  BINARY_NAME: redshank

jobs:
  resolve-tag:
    name: Resolve release tag and SHA
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.tag.outputs.should_release }}
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag and SHA
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
            if [[ -z "$SHA" ]]; then
              echo "Tag $TAG not found" >&2; exit 1
            fi
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG=$(git tag --points-at "$SHA" \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n 1 || true)
            if [[ -z "$TAG" ]]; then
              echo "No semver tag found for workflow_run SHA $SHA; skipping release"
              {
                echo "should_release=false"
                echo "tag="
                echo "sha="
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SHA="${GITHUB_SHA}"
          fi

          {
            echo "should_release=true"
            echo "tag=$TAG"
            echo "sha=$SHA"
          } >> "$GITHUB_OUTPUT"

  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    if: ${{ needs.resolve-tag.outputs.should_release == 'true' && needs.resolve-tag.outputs.tag != '' }}
    timeout-minutes: 15

    steps:
      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.resolve-tag.outputs.sha }}
        run: |
          set -euo pipefail

          sha="${RELEASE_SHA}"
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          echo "Checking CI status for ${repo}@${sha}"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" ]]; then
              echo "Attempt ${attempt}/30: CI workflow run not found yet; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_status}" != "completed" ]]; then
              echo "Attempt ${attempt}/30: CI is ${ci_status}; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_conclusion}" == "success" ]]; then
              echo "CI completed successfully for ${sha}"
              exit 0
            fi

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [resolve-tag, verify-ci]
    if: ${{ needs.resolve-tag.outputs.should_release == 'true' && needs.resolve-tag.outputs.tag != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: redshank
          - target: aarch64-apple-darwin
            os: macos-14
            bin: redshank
          - target: x86_64-apple-darwin
            os: macos-13
            bin: redshank
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: redshank.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p redshank-cli --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ env.BINARY_NAME }}"
          tar czf "${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz" "${{ env.BINARY_NAME }}" README.md

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.bin }}" "${{ env.BINARY_NAME }}.exe"
          Compress-Archive -Path "${{ env.BINARY_NAME }}.exe","README.md" -DestinationPath "${{ env.BINARY_NAME }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.*
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [resolve-tag, verify-ci, build]
    runs-on: ubuntu-latest
    if: ${{ needs.resolve-tag.outputs.should_release == 'true' && needs.resolve-tag.outputs.tag != '' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          files=( *.tar.gz *.zip )
          if (( ${#files[@]} == 0 )); then
            echo "No release archives found in dist/ matching *.tar.gz or *.zip" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          target_commitish: ${{ needs.resolve-tag.outputs.sha }}
          name: "Redshank ${{ needs.resolve-tag.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: dist/*
