name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: Build (${{ matrix.target }})
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            bin: redshank
          - target: x86_64-apple-darwin
            os: macos-13
            bin: redshank
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: redshank.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust 1.94
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release -p redshank-cli --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" \
             "redshank-${TAG}-${{ matrix.target }}"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.workflow_run.head_branch }}"
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.bin }}" `
                    "redshank-${tag}-${{ matrix.target }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redshank-${{ matrix.target }}
          path: redshank-*
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          name: "Redshank ${{ github.event.workflow_run.head_branch }}"
          draft: false
          prerelease: ${{ contains(github.event.workflow_run.head_branch, '-') }}
          generate_release_notes: true
          files: dist/*
