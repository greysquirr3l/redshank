name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check dependency graph availability
        id: depgraph
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          status="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom" \
            || echo "000")"

          if [ "$status" = "200" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "supported=false" >> "$GITHUB_OUTPUT"
          echo "Dependency graph API unavailable (HTTP ${status}); skipping dependency review." >> "$GITHUB_STEP_SUMMARY"

      - name: Dependency Review
        if: steps.depgraph.outputs.supported == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: low
          comment-summary-in-pr: always
