# Username enumeration platform templates.
# Each entry defines a platform with a URL template, expected success codes,
# and false positive patterns to filter out soft-404 pages.
#
# NO credential extraction or authentication attempts of any kind.
# Only HEAD/GET requests to check if a public profile page exists.

[[platform]]
name = "GitHub"
url_template = "https://github.com/{username}"
success_codes = [200]
false_positive_patterns = []

